on: [pull_request, push]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.10.x
          cache: 'npm'
      - run: npm ci --audit false
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run package

  release:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.10.x
          cache: 'npm'
      - run: npm ci --audit false
      - name: Package app
        run: npm run package
      - name: Build DMG installers
        run: |
          set -euo pipefail
          PRODUCT_NAME=$(node -p "require('./package.json').productName")
          mkdir -p out/dmg
          for ARCH in x64 arm64; do
            APP="out/$PRODUCT_NAME-darwin-$ARCH/$PRODUCT_NAME.app"
            # electron-packager copies/modifies the bundle (icon, Info.plist,
            # resources) after Electron's prebuilt binary was linker-signed,
            # which invalidates that signature's resource seal. Without
            # osxSign (skipped in CI, no Developer ID available), the stale
            # signature ships as-is, and Gatekeeper reports the app as
            # "damaged" on the first launch after download. Re-sign ad-hoc
            # to reseal it consistently with the final bundle contents.
            codesign --force --deep --sign - "$APP"
            STAGING="$(mktemp -d)/$ARCH"
            mkdir -p "$STAGING"
            cp -R "$APP" "$STAGING/"
            ln -s /Applications "$STAGING/Applications"
            hdiutil create -volname "$PRODUCT_NAME" -srcfolder "$STAGING" -ov -format UDZO "out/dmg/$PRODUCT_NAME-$ARCH.dmg"
          done
      - name: Compute release tag
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${PKG_VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: out/dmg/*.dmg
